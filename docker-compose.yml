services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acepick-api
    restart: unless-stopped
    ports:
      - "${DOCKER_PORT:-5050}:${PORT:-5000}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/acepickdb?schema=public
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - acepick-network

  postgres:
    image: postgres:16-alpine
    container_name: acepick-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acepickdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - acepick-network

  redis:
    image: redis:7-alpine
    container_name: acepick-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - acepick-network

volumes:
  postgres_data:
  redis_data:

networks:
  acepick-network:
    driver: bridge
